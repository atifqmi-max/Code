<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Pro Glass Auth | Login & Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #0a0f1e, #03060e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2), rgba(70, 130, 240, 0.08));
      border-radius: 50%;
      filter: blur(70px);
      animation: floatGlow 20s infinite alternate ease-in-out;
      pointer-events: none;
    }

    .orb1 {
      width: 60vw;
      height: 60vw;
      top: -20vh;
      left: -25vw;
      background: radial-gradient(circle, rgba(80, 180, 255, 0.25), rgba(30, 80, 180, 0.05));
      animation-duration: 24s;
    }

    .orb2 {
      width: 75vw;
      height: 75vw;
      bottom: -35vh;
      right: -30vw;
      background: radial-gradient(circle, rgba(200, 120, 255, 0.2), rgba(90, 40, 160, 0.08));
      animation-duration: 28s;
      animation-delay: -4s;
    }

    .orb3 {
      width: 45vw;
      height: 45vw;
      top: 45%;
      left: 55%;
      background: radial-gradient(circle, rgba(255, 200, 100, 0.18), rgba(255, 80, 100, 0.04));
      filter: blur(80px);
      animation-duration: 18s;
      animation-delay: -2s;
    }

    @keyframes floatGlow {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0.5;
      }
      100% {
        transform: translate(6%, 8%) scale(1.1);
        opacity: 0.85;
      }
    }

    .glass-auth-card {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 500px;
      background: rgba(18, 28, 45, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      padding: 2rem 1.8rem 2rem;
      transition: all 0.3s ease;
    }

    .auth-toggle {
      display: flex;
      gap: 0.8rem;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 3rem;
      padding: 0.35rem;
      margin-bottom: 2rem;
    }

    .toggle-option {
      flex: 1;
      text-align: center;
      background: transparent;
      border: none;
      padding: 0.75rem 0;
      font-weight: 600;
      font-size: 1.1rem;
      border-radius: 2.5rem;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.65);
      transition: 0.2s;
      letter-spacing: 0.3px;
    }

    .toggle-option.active {
      background: rgba(255, 255, 255, 0.18);
      color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(5px);
      border: 0.5px solid rgba(255, 255, 255, 0.35);
    }

    .form-panel {
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }

    .input-group {
      position: relative;
      width: 100%;
    }

    .input-group i:first-child {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(220, 220, 255, 0.7);
      font-size: 1rem;
      pointer-events: none;
      z-index: 2;
    }

    .input-group input {
      width: 100%;
      background: rgba(10, 18, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.9rem 1rem 0.9rem 2.7rem;
      font-size: 0.95rem;
      border-radius: 2rem;
      color: white;
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .input-group input:focus {
      border-color: rgba(100, 170, 255, 0.9);
      background: rgba(20, 32, 48, 0.85);
      box-shadow: 0 0 0 3px rgba(100, 170, 255, 0.2);
    }

    .input-group input::placeholder {
      color: rgba(210, 220, 250, 0.5);
      font-weight: 400;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(220, 230, 255, 0.7);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      z-index: 5;
    }

    .password-toggle:hover {
      color: white;
    }

    .action-button {
      background: linear-gradient(100deg, rgba(70, 130, 255, 0.9), rgba(45, 85, 210, 0.95));
      border: none;
      padding: 0.9rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.4rem;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
      letter-spacing: 0.5px;
    }

    .action-button:hover {
      background: linear-gradient(100deg, rgba(95, 160, 255, 0.95), rgba(65, 105, 240, 0.98));
      transform: scale(0.98);
    }

    .msg-area {
      margin-top: 1.3rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.6rem;
      border-radius: 2rem;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      color: #eef2ff;
    }

    .msg-area.error {
      color: #ffbcaf;
      background: rgba(170, 50, 40, 0.35);
      border-left: 3px solid #ff7b5c;
    }

    .msg-area.success {
      color: #c0ffcf;
      background: rgba(40, 130, 70, 0.35);
      border-left: 3px solid #8effa0;
    }

    .demo-tip {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 1rem;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.25);
      padding: 0.5rem;
      border-radius: 2rem;
    }

    @media (max-width: 520px) {
      .glass-auth-card {
        padding: 1.5rem;
      }
      .toggle-option {
        font-size: 1rem;
        padding: 0.6rem 0;
      }
    }
  </style>
</head>
<body>

<div class="animated-bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="glass-auth-card">
  <div class="auth-toggle">
    <button class="toggle-option" id="loginTabBtn">🔐 Login</button>
    <button class="toggle-option" id="registerTabBtn">✨ Register</button>
  </div>

  <!-- LOGIN SECTION -->
  <div id="loginSection">
    <div class="form-panel">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="password-toggle" id="toggleLoginPass" type="button"><i class="far fa-eye-slash" id="loginEyeIcon"></i></button>
      </div>
      <button class="action-button" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> &nbsp; Sign In</button>
    </div>
  </div>

  <!-- REGISTER SECTION -->
  <div id="registerSection" style="display: none;">
    <div class="form-panel">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="regName" placeholder="Full name" autocomplete="name">
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="regEmail" placeholder="Email address">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="regPassword" placeholder="Create password">
        <button class="password-toggle" id="toggleRegPass" type="button"><i class="far fa-eye-slash" id="regEyeIcon"></i></button>
      </div>
      <div class="input-group">
        <i class="fas fa-check-circle"></i>
        <input type="password" id="regConfirm" placeholder="Confirm password">
        <button class="password-toggle" id="toggleRegConfirmPass" type="button"><i class="far fa-eye-slash" id="regConfirmEyeIcon"></i></button>
      </div>
      <button class="action-button" id="registerBtn"><i class="fas fa-user-plus"></i> &nbsp; Create Account</button>
    </div>
  </div>

  <div id="globalMsg" class="msg-area">✨ Welcome — secure access with glass UI</div>
  <div class="demo-tip">
    <i class="fas fa-magic"></i> Demo Account: pro@example.com / glass123
  </div>
</div>

<script>
  (function() {
    const loginSection = document.getElementById('loginSection');
    const registerSection = document.getElementById('registerSection');
    const loginTab = document.getElementById('loginTabBtn');
    const registerTab = document.getElementById('registerTabBtn');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const msgDiv = document.getElementById('globalMsg');

    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const regName = document.getElementById('regName');
    const regEmail = document.getElementById('regEmail');
    const regPassword = document.getElementById('regPassword');
    const regConfirm = document.getElementById('regConfirm');

    const toggleLoginPass = document.getElementById('toggleLoginPass');
    const loginEyeIcon = document.getElementById('loginEyeIcon');
    const toggleRegPass = document.getElementById('toggleRegPass');
    const regEyeIcon = document.getElementById('regEyeIcon');
    const toggleRegConfirmPass = document.getElementById('toggleRegConfirmPass');
    const regConfirmEyeIcon = document.getElementById('regConfirmEyeIcon');

    function setMessage(text, type = 'info') {
      msgDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-circle-check' : (type === 'error' ? 'fa-circle-exclamation' : 'fa-info-circle')}"></i> ${text}`;
      msgDiv.classList.remove('success', 'error');
      if (type === 'success') msgDiv.classList.add('success');
      else if (type === 'error') msgDiv.classList.add('error');
      setTimeout(() => {
        if (msgDiv.innerHTML.includes(text) && (type === 'success' || type === 'error')) {
          if (!msgDiv.classList.contains('success') && !msgDiv.classList.contains('error')) return;
          msgDiv.innerHTML = `<i class="fas fa-shield-alt"></i> Ready — ${registerSection.style.display === 'none' ? 'login' : 'register'} mode`;
          msgDiv.classList.remove('success', 'error');
        }
      }, 3500);
    }

    const STORAGE_KEY = 'glass_auth_users';

    function loadUsers() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          return JSON.parse(stored);
        } catch(e) { return []; }
      } else {
        const demoUsers = [
          { id: '1', name: 'Glass Pro', email: 'pro@example.com', password: btoa('glass123') }
        ];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(demoUsers));
        return demoUsers;
      }
    }

    function saveUsers(users) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    function findUserByEmail(users, email) {
      return users.find(u => u.email.toLowerCase() === email.toLowerCase());
    }

    function verifyPassword(storedEncoded, rawPass) {
      return btoa(rawPass) === storedEncoded;
    }

    function encodePass(pass) {
      return btoa(pass);
    }

    function handleRegister() {
      const name = regName.value.trim();
      const email = regEmail.value.trim();
      const password = regPassword.value;
      const confirm = regConfirm.value;

      if (!name || !email || !password || !confirm) {
        setMessage('❌ Please fill all fields to register.', 'error');
        return;
      }
      if (password.length < 4) {
        setMessage('🔒 Password must be at least 4 characters.', 'error');
        return;
      }
      if (password !== confirm) {
        setMessage('⚠️ Passwords do not match!', 'error');
        return;
      }
      if (!email.includes('@') || !email.includes('.')) {
        setMessage('📧 Enter a valid email address.', 'error');
        return;
      }

      let users = loadUsers();
      if (findUserByEmail(users, email)) {
        setMessage('⚠️ Email already exists. Try logging in.', 'error');
        return;
      }

      const newUser = {
        id: Date.now().toString(),
        name: name,
        email: email,
        password: encodePass(password)
      };
      users.push(newUser);
      saveUsers(users);

      regName.value = '';
      regEmail.value = '';
      regPassword.value = '';
      regConfirm.value = '';

      setMessage(`🎉 Registration successful! Welcome ${name}. Please log in.`, 'success');
      setTimeout(() => {
        if (loginSection.style.display !== 'none') return;
        loginTab.click();
        setMessage(`✅ Account created! Now sign in with your credentials.`, 'success');
      }, 1000);
    }

    function handleLogin() {
      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        setMessage('🔐 Please enter both email and password.', 'error');
        return;
      }

      const users = loadUsers();
      const user = findUserByEmail(users, email);

      if (!user) {
        setMessage('❌ No account found. Please register first.', 'error');
        return;
      }

      if (!verifyPassword(user.password, password)) {
        setMessage('🔒 Wrong password. Try again.', 'error');
        return;
      }

      sessionStorage.setItem('glassSession', JSON.stringify({ email: user.email, name: user.name, loggedAt: Date.now() }));
      setMessage(`✅ Welcome back ${user.name}! Redirecting to homepage...`, 'success');
      
      setTimeout(() => {
        window.location.href = 'homepage.html';
      }, 800);
    }

    function setupPasswordToggle(toggleBtn, passwordInput, eyeIcon) {
      if (!toggleBtn || !passwordInput) return;
      toggleBtn.addEventListener('click', function(e) {
        e.preventDefault();
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        if (type === 'text') {
          eyeIcon.classList.remove('fa-eye-slash');
          eyeIcon.classList.add('fa-eye');
        } else {
          eyeIcon.classList.remove('fa-eye');
          eyeIcon.classList.add('fa-eye-slash');
        }
      });
    }

    setupPasswordToggle(toggleLoginPass, loginPassword, loginEyeIcon);
    setupPasswordToggle(toggleRegPass, regPassword, regEyeIcon);
    setupPasswordToggle(toggleRegConfirmPass, regConfirm, regConfirmEyeIcon);

    function setActivePanel(panel) {
      if (panel === 'login') {
        loginSection.style.display = 'block';
        registerSection.style.display = 'none';
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        setMessage('🔑 Login to access member dashboard', 'info');
      } else {
        loginSection.style.display = 'none';
        registerSection.style.display = 'block';
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        setMessage('📝 Join the community — register now', 'info');
      }
    }

    loginTab.addEventListener('click', () => setActivePanel('login'));
    registerTab.addEventListener('click', () => setActivePanel('register'));

    loginBtn.addEventListener('click', handleLogin);
    registerBtn.addEventListener('click', handleRegister);

    function addEnterHandler(inputs, callback) {
      inputs.forEach(input => {
        if (input) {
          input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              callback();
            }
          });
        }
      });
    }

    addEnterHandler([loginEmail, loginPassword], handleLogin);
    addEnterHandler([regName, regEmail, regPassword, regConfirm], handleRegister);

    setActivePanel('login');
  })();
</script>
</body>
</html>
